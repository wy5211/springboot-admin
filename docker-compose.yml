version: '3.8'

services:
  # MySQL
  mysql:
    image: mysql:8.0
    container_name: admin-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: springboot_admin
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - admin-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: admin-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - admin-network

  # MinIO
  minio:
    image: minio/minio:latest
    container_name: admin-minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - admin-network

  # Spring Boot 应用
  app:
    build: .
    container_name: admin-app
    restart: always
    depends_on:
      - mysql
      - redis
      - minio
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: springboot_admin
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: root123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      JWT_SECRET: MySecretKeyForJWTTokenGenerationWhichIsLongEnough123456
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    networks:
      - admin-network

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: admin-nginx
    restart: always
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - admin-network

volumes:
  mysql-data:
  redis-data:
  minio-data:

networks:
  admin-network:
    driver: bridge
